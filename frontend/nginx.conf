# Configuración de nginx para servir la SPA y redirigir la API al backend.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresión básica.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Cache agresiva para assets con hash en el nombre.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy de la API (cubre /api/v1 y /api/docs) hacia el backend.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Fallback de SPA: cualquier otra ruta sirve index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
